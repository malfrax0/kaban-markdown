name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

env:
  DOCKER_IMAGE: malfrax/malfrax_utils

jobs:
  # ───────────────────────────── Backend Tests ─────────────────────────────
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run server tests
        run: pnpm test:server

  # ───────────────────────────── Frontend Tests ────────────────────────────
  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run client tests
        run: pnpm test:client

  # ───────────────────────────── Cypress Component Tests ───────────────────
  test-cypress:
    name: Cypress Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cypress component tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: client
          component: true
          install: false

  # ───────────────────────────── Cypress E2E Tests ─────────────────────────
  test-cypress-e2e:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: client
          install: false
          start: pnpm dev
          wait-on: "http://localhost:5173"
          wait-on-timeout: 60

  # ───────────────────────────── Docker Build & Push ───────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-server, test-client, test-cypress, test-cypress-e2e]
    # Only build+push on main or branches containing "deploy" (skip PRs)
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || contains(github.ref, 'deploy'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for version calculation

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Version tag for main (conventional commits) ──
      - name: Calculate next version (main only)
        if: github.ref == 'refs/heads/main'
        id: version
        run: |
          # Get the latest version tag, default to v0.0.0 if none
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          echo "Latest tag: $LATEST_TAG"

          # Parse semver
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Analyze commits since last tag to determine bump type
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST_TAG}..HEAD")
          fi

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^feat(\(.+\))?!:|^BREAKING CHANGE:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump type: $BUMP"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      # ── Branch tag for deploy branches ──
      - name: Calculate branch tag
        if: github.ref != 'refs/heads/main'
        id: branch_tag
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          # Sanitize: replace / and special chars with -
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "tag=${SAFE_BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # ── Build & push for main ──
      - name: Build and push (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & push for deploy branches ──
      - name: Build and push (branch)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.branch_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Create git tag for main releases ──
      - name: Create Git tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.new_version }}"
          git push origin "${{ steps.version.outputs.new_version }}"
